<style>
    /* إضافة لمسة الفخامة القصوى */
    .perfume-container {
        display: flex;
        height: 100vh;
        width: 100%;
        overflow: hidden;
        background: #000;
    }

    .fragrance-column {
        flex: 1;
        position: relative;
        border-right: 0.5px solid rgba(255,255,255,0.1);
        transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        filter: grayscale(80%);
    }

    /* تأثير التوسع: العطر اللي كيشوفو الزبون كيولي هو الملك */
    .fragrance-column:hover {
        flex: 3;
        filter: grayscale(0%);
    }

    .fragrance-column h3 {
        font-family: 'Cinzel', serif;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        letter-spacing: 10px;
        font-size: 0.8rem;
        opacity: 0.5;
        transition: 0.5s;
    }

    .fragrance-column:hover h3 {
        opacity: 1;
        letter-spacing: 15px;
        color: var(--accent);
    }

    .bottle-preview {
        position: absolute;
        bottom: -50px;
        width: 150%;
        opacity: 0;
        transition: 0.8s;
        pointer-events: none;
    }

    .fragrance-column:hover .bottle-preview {
        bottom: 20%;
        opacity: 1;
        transform: scale(1.1);
    }

    /* الألوان الخاصة بكل عطر */
    .sauvage { --accent: #4A90E2; }
    .stronger { --accent: #CD7F32; }
    .libre { --accent: #D4AF37; }
    .goodgirl { --accent: #1a4d99; }
</style>

<div class="perfume-container">
    <div class="fragrance-column sauvage">
        <h3>SAUVAGE ELIXIR</h3>
        <img src="sauvage-png.png" class="bottle-preview">
    </div>
    
    <div class="fragrance-column stronger">
        <h3>STRONGER WITH YOU</h3>
        <img src="stronger-png.png" class="bottle-preview">
    </div>

    <div class="fragrance-column libre">
        <h3>LIBRE INTENSE</h3>
        <img src="libre-png.png" class="bottle-preview">
    </div>

    <div class="fragrance-column goodgirl">
        <h3>GOOD GIRL</h3>
        <img src="goodgirl-png.png" class="bottle-preview">
    </div>
</div>
