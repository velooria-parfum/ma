<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOORIA BEAUTY</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #4A90E2; --bronze: #CD7F32; --gold: #D4AF37; --royal: #1a4d99; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background-color:#000; color:#fff; font-family:'Montserrat', sans-serif; overflow-x:hidden; }

        /* الواجهة الرباعية */
        #main-hub { display: grid; grid-template-columns: repeat(4, 1fr); height: 100vh; align-items: center; padding: 0 5%; gap: 15px; }
        .perfume-item { text-align: center; cursor: pointer; transition: 0.5s; }
        .perfume-item img { width: 100%; filter: drop-shadow(0 0 15px var(--glow)); }
        .perfume-item h2 { font-family: 'Cinzel'; font-size: 0.8rem; margin-top: 15px; }

        /* زر الرجوع */
        #back-nav { position: fixed; top: 20px; right: 20px; z-index: 1000; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px; cursor: pointer; display: none; font-family: 'Cinzel'; }

        /* صفحات العطور */
        .scent-page { display: none; }
        .full-video { width: 100%; height: auto; }
        .details-row { display: flex; align-items: center; padding: 60px 8%; }
        .text-left { width: 60%; text-align: left; } /* النصوص على اليسار كما طلبت */
        .img-right { width: 40%; text-align: right; } /* الصور على اليمين كما طلبت */
        .img-right img { width: 100%; filter: drop-shadow(0 0 20px var(--glow)); }

        /* منطقة الشراء Minimalist */
        .checkout { display: flex; justify-content: space-between; padding: 80px 8%; }
        .form-side { width: 45%; }
        .form-side input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #333; padding: 15px 0; color: #fff; text-align: right; margin-bottom: 20px; }
        .reserve-btn { width: 100%; background: #fff; color: #000; padding: 20px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; border: none; }
        
        .info-side { width: 40%; text-align: right; }
        .price-tag { font-family: 'Cinzel'; font-size: 2rem; display: block; margin-bottom: 20px; color: var(--glow); }
        .size-box { display: flex; gap: 30px; justify-content: flex-end; }
        .size-btn { cursor: pointer; color: #444; transition: 0.3s; font-weight: bold; }
        .size-btn.active { color: #fff; border-bottom: 2px solid var(--glow); }

        footer { text-align: center; padding: 40px; color: #333; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="back-nav" onclick="goHome()">← BACK</div>

    <div id="main-hub">
        <div class="perfume-item" style="--glow: var(--blue)" onclick="openPerfume('sauvage')">
            <img src="assets/sauvage.png">
            <h2>SAUVAGE ELIXIR</h2>
        </div>
        </div>

    <div id="sauvage" class="scent-page" style="--glow: var(--blue)">
        <video class="full-video" autoplay muted loop><source src="assets/sauvage-vid.mp4"></video>
        
        <div class="details-row">
            <div class="text-left">
                <h3 style="font-family:'Cinzel'; color:var(--blue)">PERFORMANCE</h3>
                <p>فوحان قوي وثبات يدوم لأكثر من 24 ساعة.</p>
            </div>
            <div class="img-right"><img src="assets/sauvage-p.png"></div>
        </div>

        <div class="checkout">
            <div class="form-side">
                <input type="text" id="name-sauvage" placeholder="الاسم الكامل">
                <input type="tel" id="phone-sauvage" placeholder="رقم الهاتف">
                <input type="text" id="city-sauvage" placeholder="المدينة">
                <button class="reserve-btn" onclick="sendOrder('Sauvage', 'sauvage')">احجز الآن</button>
            </div>
            <div class="info-side">
                <img src="assets/sauvage-t.png" style="width:100px; margin-bottom:10px;">
                <span class="price-tag" id="price-sauvage">319 DH</span>
                <div class="size-box">
                    <span class="size-btn" onclick="updatePrice(199, '5ML', 'sauvage', this)">5ML</span>
                    <span class="size-btn active" onclick="updatePrice(319, '10ML', 'sauvage', this)">10ML</span>
                </div>
            </div>
        </div>
    </div>

    <footer>VELOORIA BEAUTY | TECHNICAL SUPPORT: 0691444558</footer>

    <script type="module">
        import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0/dist/web.js'
        Typebot.initBubble({
            typebot: "my-typebot-v5y1jji",
            theme: { placement: "left", button: { backgroundColor: "#1D1D1D" } }
        });
    </script>

    <script>
        let selectedSize = "10ML";
        let selectedPrice = "319 DH";

        function openPerfume(id) {
            const page = document.getElementById(id);
            if(page) {
                document.getElementById('main-hub').style.display = 'none';
                page.style.display = 'block';
                document.getElementById('back-nav').style.display = 'block';
                window.scrollTo(0,0);
            }
        }

        function goHome() {
            document.getElementById('main-hub').style.display = 'grid';
            document.querySelectorAll('.scent-page').forEach(p => p.style.display = 'none');
            document.getElementById('back-nav').style.display = 'none';
        }

        function updatePrice(p, s, id, el) {
            selectedPrice = p + " DH";
            selectedSize = s;
            document.getElementById('price-' + id).innerText = selectedPrice;
            el.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function sendOrder(prod, id) {
            const name = document.getElementById('name-'+id).value;
            const phone = document.getElementById('phone-'+id).value;
            const city = document.getElementById('city-'+id).value;
            if(!name || !phone || !city) return alert("عمر الخانات!");

            const msg = `🚀 *طلب جديد*\n📦 *المنتوج:* ${prod}\n📏 *القياس:* ${selectedSize}\n💰 *الثمن:* ${selectedPrice}\n👤 *الاسم:* ${name}\n📞 *الهاتف:* ${phone}\n📍 *المدينة:* ${city}\n✅ يونس، كليان جديد كيتسناك!`;
            
            fetch(`https://api.telegram.org/bot8751066528:AAFJOYkbqi3bSxncJh4tKSQeH_0wCT660ps/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: "7635707772", text: msg, parse_mode: 'Markdown' })
            }).then(() => alert("تم الحجز بنجاح!"));
        }
    </script>
</body>
</html>
