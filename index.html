<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELOORIA | THE SCENT MULTIVERSE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">

    <style>
        /* [1] الأساسيات - هادشي كيعطي السلاسة وماخصوش يتمسح */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; /* الخلفية الكحلة الأساسية */
            color: #fff; 
            font-family: 'Montserrat', sans-serif; 
            overflow-x: hidden; 
            scroll-behavior: smooth;
        }

        /* [2] تأثير "Black Velvet" - خلفية كتحرك خفيف بزاف كتعطي فخامة */
        .velvet-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
            z-index: -1;
        }

        /* [3] واجهة اختيار العطور (The Gate) */
        .main-gate {
            height: 100vh;
            display: flex;
            flex-direction: column; /* للموبيل */
        }
        @media (min-width: 992px) { .main-gate { flex-direction: row; } }

        .scent-option {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            cursor: pointer;
            border: 0.1px solid rgba(255,255,255,0.05);
        }
        /* فاش كتحط السهم (Hover) - العطر كيتوسع */
        .scent-option:hover { flex: 4; }

        .scent-option h2 {
            font-family: 'Cinzel';
            font-size: 1.5rem;
            letter-spacing: 5px;
            z-index: 2;
            opacity: 0.5;
            transition: 0.5s;
        }
        .scent-option:hover h2 { opacity: 1; letter-spacing: 15px; color: var(--accent); }

        /* [4] عالم العطر المستقل (The Scent Universe) */
        .scent-universe {
            min-height: 100vh;
            display: none; /* كيكون مخفي حتى تكليكي */
            padding: 50px 5%;
            position: relative;
            animation: fadeIn 1.5s forwards;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تنسيق الأصالة: القرعة الكبيرة والصغيرة */
        .authenticity-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 50px;
            margin-top: 50px;
        }
        @media (min-width: 992px) { .authenticity-view { flex-direction: row; } }

        .mother-bottle { width: 250px; filter: grayscale(30%); transition: 1s; }
        .decant-bottle { width: 120px; filter: drop-shadow(0 0 20px var(--accent)); }

        /* [5] أزرار اختيار السعة (5ml / 10ml) */
        .size-picker {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }
        .size-btn {
            padding: 15px 40px;
            border: 1px solid #fff;
            background: transparent;
            color: #fff;
            font-family: 'Cinzel';
            cursor: pointer;
            transition: 0.3s;
        }
        .size-btn:hover, .size-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* ألوان الهوية لكل عطر (تقدر تزيد منهم قد ما بغيتي) */
        .sauvage-theme { --accent: #4A90E2; }
        .stronger-theme { --accent: #FF6B00; }
    </style>
</head>
<body>

    <div class="velvet-bg"></div>

    <div id="gate" class="main-gate">
        
        <div class="scent-option sauvage-theme" onclick="openUniverse('sauvage-ui')">
            <h2>SAUVAGE</h2>
            </div>

        <div class="scent-option stronger-theme" onclick="openUniverse('stronger-ui')">
            <h2>STRONGER</h2>
        </div>

        </div>

    <section id="sauvage-ui" class="scent-universe sauvage-theme">
        <button onclick="closeUniverse()" style="color:#fff; background:none; border:none; cursor:pointer;">← BACK TO COLLECTION</button>
        
        <div class="authenticity-view">
            <div style="text-align:center;">
                <p style="font-size: 10px; letter-spacing: 3px; color: #555;">THE SOURCE</p>
                <img src="assets/sauvage-big.png" class="mother-bottle" alt="Original Bottle">
            </div>

            <div style="color: var(--accent); font-size: 2rem;">→</div>

            <div style="text-align:center;">
                <p style="font-size: 10px; letter-spacing: 3px; color: #555;">YOUR SELECTION</p>
                <img src="assets/decant-bottle.png" class="decant-bottle">
            </div>
        </div>

        <div style="text-align:center; margin-top: 50px;">
            <h1 style="font-family:'Cinzel'; letter-spacing: 10px;">SAUVAGE ELIXIR</h1>
            <p style="max-width:600px; margin: 20px auto; color: #888;">Pure essence, hand-decanted from the original masterpiece.</p>
            
            <div class="size-picker" style="justify-content: center;">
                <button class="size-btn" onclick="updatePrice(this, '160 DH')">5ML</button>
                <button class="size-btn" onclick="updatePrice(this, '310 DH')">10ML</button>
            </div>
            <h2 id="price-tag" style="margin-top: 30px; font-family:'Cinzel';">SELECT SIZE</h2>
            <button style="margin-top:20px; padding: 20px 80px; background: #fff; color: #000; border: none; font-family:'Cinzel'; letter-spacing: 5px; cursor:pointer;">ORDER NOW</button>
        </div>
    </section>

    <script>
        // دالة كتحل عالم العطر وكتخبي الواجهة الرئيسية
        function openUniverse(id) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            window.scrollTo(0,0);
        }

        // دالة كترجعك للواجهة الرئيسية
        function closeUniverse() {
            // كتمسح كاع العوالم اللي مفتوحين
            const universes = document.querySelectorAll('.scent-universe');
            universes.forEach(u => u.style.display = 'none');
            
            document.getElementById('gate').style.display = 'flex';
        }

        // دالة كتبدل الثمن فاش الزبون كيختار 5مل أو 10مل
        function updatePrice(btn, price) {
            // حيد "اللون النشط" من كاع الأزرار
            const btns = btn.parentElement.querySelectorAll('.size-btn');
            btns.forEach(b => b.classList.remove('active'));
            
            // زيد اللون النشط للزر اللي تبرك عليه
            btn.classList.add('active');
            
            // بدل نص الثمن
            document.getElementById('price-tag').innerText = price;
        }
    </script>

</body>
</html>
